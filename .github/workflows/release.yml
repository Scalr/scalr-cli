name: Compile and Release

on: 
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Version for new release
        required: true
        default: 0.0.0
        
jobs:
  compile:
    name: Compile and Release
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.SUDO_GHA_CLIENT_ID }}
          private-key: ${{ secrets.SUDO_GHA_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Required for git operations
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '>=1.18.0'

      - name: Compile and Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          stdbuf -oL bash build-all.sh $VERSION
          gh release create v$VERSION --generate-notes ./bin/*.zip ./bin/*_SHA256SUMS
